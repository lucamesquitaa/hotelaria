<div class="cadastroContainer page-with-menubar" [class.menu-collapsed]="!(menubarService.isOpen$ | async)">
  <div class="cadastroForm">
    <div class="content-wrapper">
    
    <!-- Stepper Compacto Universal Melhorado -->
    <div class="stepper-enhanced">
      <div class="stepper-header">
        <h3 class="stepper-title">Cadastro do Quarto</h3>
        <div class="step-counter">
          <span class="current">{{ currentStep }}</span>
          <span class="separator">/</span>
          <span class="total">{{ steps.length }}</span>
        </div>
      </div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="(currentStep / steps.length) * 100"></div>
        </div>
        <div class="steps-list">
          <div 
            *ngFor="let step of steps" 
            class="step-item"
            [class.active]="step.number === currentStep"
            [class.completed]="isStepCompleted(step.number)"
            [class.accessible]="true"
            [title]="step.description"
            (click)="goToStep(step.number)"
          >
            <div class="step-circle">
              <i *ngIf="isStepCompleted(step.number)" class="bi bi-check-lg"></i>
              <span *ngIf="!isStepCompleted(step.number)">{{ step.number }}</span>
            </div>
            <div class="step-content">
              <div class="step-title">{{ step.title }}</div>
              <div class="step-description">{{ step.description }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div *ngIf="currentStep === 1" class="formContainer 1">
        <h3>Informações Básicas do Quarto</h3>

            <div class="col-lg-12 col-md-12">
              <label for="name" class="form-label">Nome do quarto</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.name" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="tipo" class="form-label">Tipo do quarto</label>
              <app-select-remote
                [apiUrl]="apiUrlCategoryQuartos"
                placeholder="Selecione o tipo do quarto"
                valueProperty="id"
                labelProperty="name"
                [(ngModel)]="categorys"
                [searchable]="false"
                [multiple]="true"
                [maxVisibleTags]="5"
                (addNew)="onCadastrarTipoQuarto($event)">
              </app-select-remote>
              
            </div>
            

            <div class="col-lg-12 col-md-12">
              <label for="description" class="form-label">Descrição</label>
              <textarea class="form-control" [(ngModel)]="itemCadastro.description"></textarea>
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="maxOcupation" class="form-label">Ocupação máxima</label>
              <input type="number" class="form-control" [(ngModel)]="itemCadastro.maxOcupation" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="areaSize" class="form-label">Tamanho da área (m²)</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.areaSize" >
            </div>
          
          <div class="col-lg-12 col-md-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.refund">
              <label class="form-check-label">Reembolsável</label>
            </div>
          </div>

          <div class="col-lg-12 col-md-12 redBox" *ngIf="errorList.length > 0">
          <div class="flexRow" *ngFor="let error of errorList">
            <i class="bi bi-x-circle" style="color:red;"></i>
            <p>{{error}}</p>
          </div>
        </div> 

      <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(2)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
    </div>

    <div *ngIf="currentStep === 2" class="formContainer 2">
        <h3>Comodidades e Serviços</h3>
            <div class="col-lg-12 col-md-12">
              <label for="diff" class="form-label">Diferenciais do quarto</label>
              <textarea class="form-control" [(ngModel)]="itemCadastro.diff"></textarea>
            </div>

            <div class="col-lg-12 col-md-12">
              <label for="beds" class="form-label">Tipos de cama</label>
              <div class="bed-list">
                <div *ngFor="let bed of itemCadastro.beds; let i = index" class="bed-item">
                  <select class="form-select" [(ngModel)]="bed.type" name="bedType{{i}}">
                    <option value="">Selecione o tipo:</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="casal">Casal</option>
                    <option value="queen">Queen</option>
                    <option value="king">King</option>
                    <option value="beliche">Beliche</option>
                  </select>
                  <input type="number" class="form-control" [(ngModel)]="bed.quantity" name="bedQuantity{{i}}" min="1" placeholder="Qtd">
                  <button type="button" class="btn btn-outline-danger btn-sm" (click)="removeBed(i)">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>
              <button type="button" class="btn btn-outline-primary btn-sm mt-2" (click)="addBed()">
                <i class="bi bi-plus-circle"></i> Adicionar cama
              </button>
            </div>
            
          <div class="checksboxes">
            <div class="row">
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.freeze">
                  <label class="form-check-label">Frigobar</label>
                </div>
              </div>
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.vault">
                  <label class="form-check-label">Cofre</label>
                </div>
              </div>
            </div>
            
            <div class="row">
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.telephone">
                  <label class="form-check-label">Telefone</label>
                </div>
              </div>
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.coffee">
                  <label class="form-check-label">Cafeteira</label>
                </div>
              </div>
            </div>
            
            <div class="row">
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.wifi">
                  <label class="form-check-label">Wi-Fi</label>
                </div>
              </div>
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.fridge">
                  <label class="form-check-label">Geladeira</label>
                </div>
              </div>
            </div>
            
            <div class="row">
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.cleaning">
                  <label class="form-check-label">Serviço de limpeza</label>
                </div>
              </div>
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.varanda">
                  <label class="form-check-label">Varanda</label>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.bathroom">
                  <label class="form-check-label">Banheiro privativo</label>
                </div>
              </div>
              <div class="col-lg-6 col-md-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="itemCadastro.tv">
                  <label class="form-check-label">TV</label>
                </div>
              </div>
            </div>
          </div>

          
            
            <div class="col-lg-12 col-md-12">
              <label for="bathProducts" class="form-label">Produtos de banho</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.bathProducts" placeholder="Ex: Shampoo, sabonete, toalhas">
            </div>
            
            <div class="col-lg-12 col-md-12">
              <label for="typeTv" class="form-label">Tipo da TV</label>
              <select class="form-select" [(ngModel)]="itemCadastro.typeTv">
                <option value="" disabled selected>Selecione:</option>
                <option value="LCD">LCD</option>
                <option value="LED">LED</option>
                <option value="Smart TV">Smart TV</option>
                <option value="4K">4K</option>
              </select>
            </div>
            
          <div class="col-lg-12 col-md-12 redBox" *ngIf="errorList.length > 0">
          <div class="flexRow" *ngFor="let error of errorList">
            <i class="bi bi-x-circle" style="color:red;"></i>
            <p>{{error}}</p>
          </div>
        </div>   
      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(1)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(3)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>

    <div *ngIf="currentStep === 3" class="formContainer 3">
        <h3>Upload de Imagens</h3>

      <div class="col-lg-12 col-md-12">
        <label for="image" class="form-label">Máximo de 10 imagens!</label>
        <input type="file" class="form-control" (change)="onFileSelected($event)" multiple>
      </div>

      <div>
        <ul>
          <li *ngFor="let img of imagens" style="color:darkgreen; padding:3px;">{{ img.name }}</li>
        </ul>
      </div>
            

      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(2)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(4)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>

    <div *ngIf="currentStep === 4" class="formContainer 4">
        <h3>Conclusão</h3>

            <div class="form-check margin10">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="acceptTerms1" required>
              <label class="form-check-label">
                Confirmo que todas as informações do quarto estão corretas e atualizadas.
              </label>
            </div>
            <div class="form-check margin10">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="acceptTerms2" required>
              <label class="form-check-label">
                Autorizo a divulgação das informações do quarto no sistema.
              </label>
            </div>

          <div class="col-lg-12 col-md-12 redBox" *ngIf="errorList.length > 0">
            <div class="flexRow" *ngFor="let error of errorList">
              <i class="bi bi-x-circle" style="color:red;"></i>
              <p>{{error}}</p>
            </div>
          </div> 

      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(3)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-success btn-md buttonSubmit" (click)="onConcluirCadastro()">Concluir Cadastro <i class="bi bi-check-circle"></i></button>  
      </div>
    </div>



    </div> <!-- End content-wrapper -->
   
</div>

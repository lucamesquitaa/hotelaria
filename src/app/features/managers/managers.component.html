<div class="managersContainer page-with-menubar" [class.menu-collapsed]="!(menubarService.isOpen$ | async)">
    
    
    <div class="content-wrapper">
        <!-- Header Section -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-people"></i>
                Gerenciar Usuários
            </h1>
        </div>

        <!-- Add Manager Section -->
        <div class="add-manager-section">
            <form class="add-manager-form" (ngSubmit)="onSetPermission()">
                <div class="form-row">
                    <input 
                        type="email" 
                        class="form-control" 
                        [(ngModel)]="email" 
                        name="email"
                        placeholder="Digite o email do usuário..."
                        required
                    />
                    <select class="form-control" [(ngModel)]="selectedRole" name="role" required>
                        <option value="" disabled selected>Selecione a permissão</option>
                        <option value="admin">Administrador</option>
                        <option value="manager">Gerente</option>
                    </select>
                    <button 
                        type="submit" 
                        class="btn btn-primary"
                        [disabled]="!email || email.trim() === '' || !selectedRole"
                        [class.loading]="isLoading"
                    >
                        <span *ngIf="!isLoading">Adicionar</span>
                        <span *ngIf="isLoading">Processando...</span>
                    </button>
                </div>
            </form>
            <!-- Empty State -->
            <div class="empty-state" *ngIf="!managers || managers.length === 0">
                <p>Nenhum usuário encontrado</p>
            </div>

            <!-- Managers List -->
            <div class="managers-list" *ngIf="managers && managers.length > 0">
                <div class="manager-item" *ngFor="let manager of managers">
                    <div class="manager-info">
                        <div class="manager-email">{{ manager.email }}</div>
                        <div class="manager-role" [attr.data-role]="manager.role.toLowerCase()">
                            {{ getRoleDisplayName(manager.role) }}
                        </div>
                    </div>
                    <button 
                    *ngIf="manager.role.toLowerCase() !== 'admin'"
                        class="btn btn-outline-danger btn-sm" 
                        title="Remover permissão"
                        (click)="removeManager(manager.email)"
                    >
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

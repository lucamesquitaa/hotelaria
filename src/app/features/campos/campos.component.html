<div class="camposContainer page-with-menubar" [class.menu-collapsed]="!(menubarService.isOpen$ | async)">
    <app-header></app-header>
    <!-- Stepper Compacto Universal Melhorado -->
    <div class="stepper-enhanced">
      <div class="stepper-header">
        <h3 class="stepper-title">Cadastro do Quarto</h3>
        <div class="step-counter">
          <span class="current">{{ currentStep }}</span>
          <span class="separator">/</span>
          <span class="total">{{ steps.length }}</span>
        </div>
      </div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="(currentStep / steps.length) * 100"></div>
        </div>
        <div class="steps-list">
          <div 
            *ngFor="let step of steps" 
            class="step-item"
            [class.active]="step.number === currentStep"
            [class.completed]="isStepCompleted(step.number)"
            [class.accessible]="true"
            [title]="step.description"
            (click)="goToStep(step.number)"
          >
            <div class="step-circle">
              <i *ngIf="isStepCompleted(step.number)" class="bi bi-check-lg"></i>
              <span *ngIf="!isStepCompleted(step.number)">{{ step.number }}</span>
            </div>
            <div class="step-content">
              <div class="step-title">{{ step.title }}</div>
              <div class="step-description">{{ step.description }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="currentStep === 1">
        <app-menubar></app-menubar>
        <div class="section-block">
            <h3>Selecionar Hotel</h3>
            <div *ngFor="let item of filteredHoteis()" class="simple-card" (click)="onHotelSelecionado(item.id)">
                <div class="card-title">{{item.name}}</div>
                <div class="card-subtitle">{{item.url}}</div>
            </div>
        </div>  
    </div>   

    <div *ngIf="currentStep === 2">
        <app-menubar></app-menubar>
        <div class="section-block">
            <h3>Selecionar Campo</h3>
            <div class="simple-card" (click)="campoNumberChange(1)">
                <div class="card-title">Categoria Quarto</div>
            </div>
        </div>
    </div>

   

    <div *ngIf="currentStep === 3" class="content-wrapper">
        <app-menubar></app-menubar>
        
        <div class="page-content" *ngIf="campoNumber() == 1">
            <app-category-campo [hotelId]="hotelId()"></app-category-campo>
        </div>
    </div>

</div>

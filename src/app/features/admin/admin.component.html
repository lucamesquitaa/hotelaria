

<div class="adminContainer">
  <app-menubar></app-menubar>
  
  <div class="melhorias">
    <h4>Buscar:</h4>
      <input
        id="typeahead-format"
        type="text"
        class="form-control col-lg-6 col-md-6"
        [(ngModel)]="hotel"
        (ngModelChange)="onHotelSelecionado()"
        [ngbTypeahead]="search"
        accentSensitive="false"
        [resultFormatter]="formatter"
        [inputFormatter]="formatter"
      />
      <hr/>
    <div  *ngFor="let item of filteredHoteis" class="hotelCard col-lg-6 col-md-6">
      <img [src]="item.photosStared[0]" alt="imagem principal hotel"/>
      <div class="d-flex flex-column align-items-center justify-content-center spaceB">
      <span class="text-center spanName textBold">{{item.name}}</span>
        <span class="text-center spanName">{{item.url}}</span>
      </div>
      <div class="d-flex flex-column align-items-center justify-content-center spaceB">
      <button class="btn btn-outline-primary mb-2 me-2 bi bi-pencil">Editar</button>
      <button class="btn btn-outline-primary mb-2 me-2 bi bi-lock" (click)="onCallPermission(item.id)">Permissão</button>
      <button class="btn btn-outline-danger  mb-2 me-2 bi bi-trash">Excluir</button>
      </div>
      
    </div>
  </div>
  <button class="btn btn-primary mb-2 me-2 bi bi-plus-circle buttonFlutua" > Adicionar</button>
  </div>

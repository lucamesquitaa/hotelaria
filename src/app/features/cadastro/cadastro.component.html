<div class="cadastroContainer page-with-menubar" [class.menu-collapsed]="!(menubarService.isOpen$ | async)">
  <app-menubar [selected]="'cadastro'"></app-menubar>
  <app-header></app-header>
  <div class="cadastroForm">
    <div class="content-wrapper">
    
    <!-- Stepper Compacto Universal Melhorado -->
    <div class="stepper-enhanced">
      <div class="stepper-header">
        <h3 class="stepper-title">Cadastro do Hotel</h3>
        <div class="step-counter">
          <span class="current">{{ currentStep }}</span>
          <span class="separator">/</span>
          <span class="total">{{ steps.length }}</span>
        </div>
      </div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="(currentStep / steps.length) * 100"></div>
        </div>
        <div class="steps-list">
          <div 
            *ngFor="let step of steps" 
            class="step-item"
            [class.active]="step.number === currentStep"
            [class.completed]="isStepCompleted(step.number)"
            [class.accessible]="true"
            [title]="step.description"
            (click)="goToStep(step.number)"
          >
            <div class="step-circle">
              <i *ngIf="isStepCompleted(step.number)" class="bi bi-check-lg"></i>
              <span *ngIf="!isStepCompleted(step.number)">{{ step.number }}</span>
            </div>
            <div class="step-content">
              <div class="step-title">{{ step.title }}</div>
              <div class="step-description">{{ step.description }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div *ngIf="currentStep === 1" class="formContainer 1">
        <h3>Informações Básicas do Hotel </h3>

            <div class="col-lg-12 col-md-12">
              <label for="name" class="form-label">Nome do hotel</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.name" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="rede" class="form-label">Rede (opcional)</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.rede" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="url" class="form-label">Url</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.url" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="cnpj" class="form-label">CNPJ</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.cnpj" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="razao" class="form-label">Razão social</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.razao" >
            </div>
            
          <div class="col-lg-12 col-md-12">
            <label for="category" class="form-label">Categoria</label>
            <select class="form-select" [(ngModel)]="itemCadastro.category">
              <option value="" disabled selected>Selecione:</option>
              <option value="1">Resort</option>
              <option value="2">Hotel</option>
              <option value="3">Pousada</option>
            </select>

         </div>

      <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(2)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
    </div>

    <div *ngIf="currentStep === 2" class="formContainer 2">
        <h3>Representante Legal</h3>

            <div class="col-lg-12 col-md-12">
              <label for="nomeRep" class="form-label">Nome</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.nomeRep" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="telRep" class="form-label">Telefone</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.telRep" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="cpfRep" class="form-label">CPF</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.cpfRep" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="emailRep" class="form-label">E-mail</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.emailRep" >
            </div>
            
      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(1)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(3)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>

    <div *ngIf="currentStep === 3" class="formContainer 3">
        <h3>Endereço</h3>
          
            
            <div class="col-lg-12 col-md-12">
              <label for="cep" class="form-label">CEP</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.cep" >
            </div>
     
            <div class="col-lg-12 col-md-12">
              <label for="city" class="form-label">Cidade</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.city" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="address" class="form-label">Endereço</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.address" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="num" class="form-label">Número</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.number" >
            </div>
            <div class="col-lg-12 col-md-12">
              <label for="comp" class="form-label">Complemento (opcional)</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.complement" >
            </div>

      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(2)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(4)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>

    <div *ngIf="currentStep === 4" class="formContainer 4">
        <h3>Infos Complementares</h3>

        <div class="col-lg-12 col-md-12">
              <label for="desc" class="form-label">Descrição do Hotel</label>
              <textarea [(ngModel)]="itemCadastro.description" class="form-control" ></textarea>
          </div>

          <div class="col-lg-12 col-md-12">
                <label for="lobby" class="form-label">Horário Recepção ou Lobby</label>
                <input type="text" class="form-control" [(ngModel)]="itemCadastro.lobby" >
              </div>
              <div class="col-lg-12 col-md-12">
                <label for="diff" class="form-label">Descreva os principais diferenciais do hotel </label>
                <textarea [(ngModel)]="itemCadastro.diff" class="form-control" ></textarea>
              </div>
            
            

            <div class="col-lg-12 col-md-12">
            <label for="child" class="form-label">Crianças</label>
            <select class="form-select" [(ngModel)]="itemCadastro.child" >
              <option value="undefined" selected>Selecione:</option>
              <option value="true">Adequado para Crianças</option>
              <option value="false">Não Adequado para Crianças</option>
            </select>
            </div>
            
          <div class="col-lg-12 col-md-12">
            <label for="pet" class="form-label">Animais</label>
            <select class="form-select" [(ngModel)]="itemCadastro.pets" >
              <option value="undefined" selected>Selecione:</option>
              <option value="true">Adequado para Animais</option>
              <option value="false">Não Adequado para Animais</option>
            </select>
          </div>
          <div class="col-lg-12 col-md-12">
              <label for="tax" class="form-label">Taxa animal (opcional)</label>
              <input type="text" class="form-control" [(ngModel)]="itemCadastro.petsTax" placeholder="R$">
          </div>
          
            
      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(3)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(5)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>


    <div *ngIf="currentStep === 5" class="formContainer 5">
        <h3>Infos Complementares</h3>
      
       
          <div class="col-lg-12 col-md-12">
            <label for="checkCafe" class="form-label">Café da manhã</label>
            <select class="form-select" [(ngModel)]="itemCadastro.coffee" >
              <option value="undefined" selected>Selecione:</option>
              <option value="true">Incluso</option>
              <option value="false">Não incluso</option>
            </select>
          </div>
          <div class="col-lg-12 col-md-12">
            <label for="checkWifi" class="form-label">Wifi</label>
            <select class="form-select" [(ngModel)]="itemCadastro.wifi" >
              <option value="undefined" selected>Selecione:</option>
              <option value="true">Incluso</option>
              <option value="false">Não incluso</option>
            </select>
          </div>
    
          <div class="col-lg-12 col-md-12">
            <label for="checkPiscina" class="form-label">Piscina</label>
            <select class="form-select" [(ngModel)]="itemCadastro.swimming" >
              <option value="undefined" selected>Selecione:</option>
               <option value="true">Incluso</option>
              <option value="false">Não incluso</option>
            </select>
          </div>
          <div class="col-lg-12 col-md-12">
            <label for="checkLimpeza" class="form-label">Serviço de limpeza</label>
            <select class="form-select" [(ngModel)]="itemCadastro.cleaning" >
              <option value="undefined" selected>Selecione:</option>
               <option value="true">Incluso</option>
              <option value="false">Não incluso</option>
            </select>
          </div>

          <div class="col-lg-12 col-md-12">
            <label for="checkAcademia" class="form-label">Academia no local</label>
            <select class="form-select" [(ngModel)]="itemCadastro.gym" >
              <option value="undefined" selected>Selecione:</option>
               <option value="true">Incluso</option>
              <option value="false">Não incluso</option>
            </select>
          </div>

          <div class="col-lg-12 col-md-12">
            <div>
              <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="itemCadastro.beach">
              <label class="form-check-label" for="checkPraia">
                Próximo a praia
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="itemCadastro.downtown">
              <label class="form-check-label" for="checkCentro">
                Próximo ao centro
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="itemCadastro.airpot">
              <label class="form-check-label" for="checkAeroporto">
                Próximo ao aeroporto
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="itemCadastro.highway">
              <label class="form-check-label" for="checkRodoviria">
                Próximo a rodoviária
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="itemCadastro.hospital">
              <label class="form-check-label" for="checkHospitais">
                Próximo a hospitais
              </label>
            </div>
          </div>
          
            
      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(4)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-primary btn-md buttonSubmit " (click)="goToStep(6)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>
   </div>
    <div *ngIf="currentStep === 6" class="formContainer 6">
        <h3>Upload de Imagens</h3>

      <div class="col-lg-12 col-md-12">
        <label for="image" class="form-label">Máximo de 10 imagens!</label>
        <input type="file" class="form-control" (change)="onFileSelected($event)" multiple>
      </div>

      <div>
        <ul>
          <li *ngFor="let img of imagens" style="color:darkgreen; padding:3px;">{{ img.name }}</li>
        </ul>
      </div>

      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(5)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-primary btn-md buttonSubmit" (click)="goToStep(7)">Continuar <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>

      <div *ngIf="currentStep === 7" class="formContainer 7">
        <h3>Conclusão de cadastro</h3> 

            <div class="form-check margin10">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="acceptTerms1" required>
              <label class="form-check-label" for="checkRodoviria">
                Ao utilizar este site, você concorda com a coleta e o tratamento de dados pessoais e informações relacionadas a hotéis, para fins de disponibilização e melhoria de nossos serviços.
              </label>
            </div>
            <div class="form-check margin10">
              <input class="form-check-input" type="checkbox" value="" [(ngModel)]="acceptTerms2" required>
              <label class="form-check-label" for="checkRodoviria">
                Autorizo o uso das imagens e informações para divulgação no site Turify e sites parceiros.
              </label>
            </div>

      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary btn-md buttonSubmit" (click)="goToStep(6)"><i class="bi bi-arrow-left-circle"></i> Voltar</button>
        <button class="btn btn-success btn-md buttonSubmit" (click)="concluirCadastro()">Concluir <i class="bi bi-arrow-right-circle"></i></button>  
      </div>
    </div>
  </div>
</div>

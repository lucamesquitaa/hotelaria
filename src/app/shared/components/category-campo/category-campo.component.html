  <div>
        <div class="add-category-section">
            <h3>Gerenciar Categorias</h3>
            <form class="add-category-form">
                <div class="form-row">
                    <input 
                        type="text" 
                        class="form-control" 
                        placeholder="Digite o nome da categoria..."
                        required
                        [(ngModel)]="newCategoryName"   
                        name="newCategoryName"
                    />
                    <button 
                        type="submit" 
                        class="btn btn-primary"
                        (click)="onPostCategory()"
                    >
                        <span>Adicionar</span>
                    </button>
                </div>
            </form>
            
            <!-- Empty State -->
            <div class="empty-state" *ngIf="!categories() || categories().length === 0">
                <p>Nenhuma categoria encontrada</p>
            </div>

            <!-- Categories List -->
            <div class="categories-list" *ngIf="categories() && categories().length > 0">
                <div class="category-item" *ngFor="let item of categories()">
                    <div class="category-info">
                        <div class="category-name">{{ item.name }}</div>
                    </div>
                    <button 
                        class="btn btn-outline-danger btn-sm" 
                        title="Remover categoria"
                        (click)="onDeleteCategory(item.id)">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

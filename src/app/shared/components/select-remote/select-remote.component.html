<div class="select-remote-container" [class.disabled]="disabled">
  <div class="select-input" 
       [class.open]="isOpen" 
       [class.has-value]="selectedValue || selectedValues.length > 0"
       (click)="toggleDropdown()">
    
    <div class="selected-value">
      <!-- Single selection display -->
      <span *ngIf="!multiple">{{ getSelectedLabel() }}</span>
      
      <!-- Multiple selection display -->
      <div *ngIf="multiple" class="multi-selection">
        <div *ngIf="selectedValues.length === 0">Selecione...</div>
        
        <div class="selected-tags" *ngIf="selectedValues.length > 0">
          <span class="tag" 
                *ngFor="let tag of getSelectedTags(); trackBy: trackByValue"
                (click)="removeTagByValue(tag.value); $event.stopPropagation()"
                title="Clique para remover">
            {{ tag.label }}
            <i class="fas fa-times tag-remove"></i>
          </span>
          
          <span class="more-count" *ngIf="selectedValues.length > maxVisibleTags">
            +{{ selectedValues.length - maxVisibleTags }} mais
          </span>
        </div>
      </div>
    </div>
    
    <div class="select-actions">
      <button type="button" 
              class="clear-button" 
              *ngIf="clearable && (selectedValue || selectedValues.length > 0)" 
              (click)="clear(); $event.stopPropagation()"
              [disabled]="disabled">
        <i class="fas fa-times"></i>
      </button>
      
      <div class="dropdown-arrow">
        <i class="fas fa-chevron-down" [class.rotate]="isOpen"></i>
      </div>
    </div>
  </div>

  <div class="dropdown" *ngIf="isOpen">
    
    <!-- Search input -->
    <div class="search-container" *ngIf="searchable">
      <div class="search-wrapper">
        <input type="text" 
               class="search-input"
               placeholder="Filtrar..."
               [value]="searchTerm"
               (input)="onSearchInput($event)"
               (click)="$event.stopPropagation()" />
        <i class="fas fa-search search-icon"></i>
      </div>
      <button type="button" 
              class="add-button" 
              *ngIf="showAddButton"
              (click)="onAddNew(); $event.stopPropagation()"
              [title]="addButtonTooltip">
        <i class="bi bi-plus-circle"></i>
      </button>
    </div>

    <!-- Loading indicator -->
    <div class="loading" *ngIf="isLoading">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Carregando...</span>
    </div>

    <!-- Options list -->
    <div class="options-container" *ngIf="!isLoading">
      <div class="option" 
           *ngFor="let option of getAvailableOptions(); trackBy: trackByValue"
           [class.selected]="isSelected(option)"
           (click)="onSelect(option)">
        
        <div class="option-content">
          <span class="option-label">{{ option.label }}</span>
        </div>
      </div>

      <!-- No results -->
      <div class="no-results" *ngIf="getAvailableOptions().length === 0">
        <i class="fas fa-search"></i>
        <span>Nenhum resultado encontrado</span>
      </div>

      <!-- Load more button -->
      <div class="load-more" *ngIf="hasMore && !isLoading">
        <button type="button" 
                class="load-more-button"
                (click)="loadMore()">
          Carregar mais
        </button>
      </div>
    </div>
  </div>
</div>

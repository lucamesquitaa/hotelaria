<div class="quarto-reserva">
    <div class="legend-header">
        <i class="bi" [ngClass]="collapsed ? 'bi-chevron-down' : 'bi-chevron-right'" (click)="toggleCollapse()"></i>
        <div >{{dados!.name}}</div>
    </div>
    
    <div class="legend-column">
        <div class="legend-item">Nº {{ dados!.number }}</div>
        <div class="legend-item" *ngIf="collapsed">Disponível</div>
        <div class="legend-item" *ngIf="collapsed">Mínimo</div>
        <div class="legend-item" *ngIf="collapsed">Máx</div>
        <div class="legend-item" *ngIf="collapsed">Preço</div>
    </div>
    <div class="date-row">
        <div *ngFor="let day of dates; let i = index" class="date-cell" >
            <!-- Célula de disponibilidade/reserva -->
       <!-- Célula de disponibilidade/reserva -->
<ng-container *ngIf="disponibilidadeForDate(day.iso) as disp" >
  <div (click)="editarDisponibilidade(content6, content7, disp, day.iso)" class="date-cell-container">
          <!-- Barra dividida para dias de check-in ou check-out -->
          <div class="dat split-bar" *ngIf="shouldShowSplitBar(day.iso)">
              <div class="half-bar" 
                  [ngClass]="getFirstHalfClass(day.iso)"
                  [title]="hasDifferentReservasOnDate(day.iso) ? 'Check-out' : 
                          (hasEarlyCheckIn(day.iso) ? 'Early Check-in' : 
                          (isCheckInDay(day.iso) ? 'Check-in' : ''))">
              </div>
              <div class="half-bar" 
                  [ngClass]="getSecondHalfClass(day.iso)"
                  [title]="hasDifferentReservasOnDate(day.iso) ? 'Check-in' :
                          (hasLateCheckOut(day.iso) ? 'Late Check-out' : 
                          (isCheckOutDay(day.iso) ? 'Check-out' : ''))">
              </div>
              
          </div>
          
          <!-- Barra normal com status combinado (dias sem check-in/check-out) -->
          <div class="dat cell-bar" 
              *ngIf="!shouldShowSplitBar(day.iso)"
              [ngClass]="getCombinedStatusClass(day.iso)">
              <!-- Nome do hóspede na barra normal -->
              <div class="guest-name" *ngIf="getGuestNameForDate(day.iso)">
                  {{ getGuestNameForDate(day.iso) }}
              </div>
          </div>
          
          <!-- Informações únicas -->
          <div class="dat cell-info" *ngIf="collapsed">{{ disp.statusString }}</div>
          <div class="dat cell-min" *ngIf="collapsed">{{ disp.minDays }}</div>
          <div class="dat cell-max" *ngIf="collapsed">{{ disp.maxDays }}</div>
          <div class="dat cell-price" *ngIf="collapsed">{{ disp.dayPrice | currency:'BRL':'symbol':'1.2-2' }}</div>
      </div>
    </ng-container>
                  
        </div>
    </div>
</div>



<!-- Modal DISPONIBILIDADE -->

  <ng-template #content6 let-modal>

    <div class="modal-header">
      <h4 class="modal-title pull-left">Editar Disponibilidade</h4>
      <button type="button" class="btn-close pull-right" aria-label="Close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
      <form>
       
        <div>
          <div class="mb-3" *ngIf="this.isDisponivel">
              <label for="clienteNome1" class="form-label">Data</label>
              <input type="text" disabled="true" class="form-control" id="clienteNome1" [value]="editDayStr" name="clienteNome1" >
            </div>
            <div class="mb-3">
              <label for="clienteNome2" class="form-label">Minímo (dias)</label>
              <input type="number" class="form-control" id="clienteNome2" [(ngModel)]="editminDays" name="clienteNome2" >
            </div>
           <div class="mb-3">
              <label for="clienteNome3" class="form-label">Máximo (dias)</label>
              <input type="number" class="form-control" id="clienteNome3" [(ngModel)]="editmaxDays" name="clienteNome3" >
            </div>
            <div class="mb-3">
              <label for="clienteNome4" class="form-label">Diária (R$)</label>
              <input type="currency" class="form-control" id="clienteNome4" [(ngModel)]="editdayPrice" name="clienteNome4" >
            </div>
          </div>

      </form>
    </div>
    <div class="modal-footer">
      
        <button type="button" class="btn btn-secondary" (click)="reset(); modal.dismiss('Cross click')">Cancelar</button>
        <button class="btn btn-primary" (click)="UpdateDisponibilidade()">Confirmar</button>

      </div>
  </ng-template>

<!-- Modal RESERVA-->
  <ng-template #content7 let-modal>

    <div class="modal-header">
      <h4 class="modal-title pull-left">Editar Reserva</h4>
      <button type="button" class="btn-close pull-right" aria-label="Close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
      <nav>
        <div class="nav nav-tabs" id="nav-tab" role="tablist">
          <button class="nav-link" [class.active]="activeTab === 'home'" 
                  (click)="setActiveTab('home')" 
                  type="button" role="tab">Home</button>
          <ng-container *ngFor="let hospede of hospedesEditando; let i = index">
            <div class="d-inline-flex align-items-center" style="position: relative;">
              <button class="nav-link" 
                      [class.active]="activeTab === 'hospede-' + i"
                      (click)="setActiveTab('hospede-' + i)"
                      type="button" role="tab">
                  Hóspede {{i + 1}}
              </button>
              <span *ngIf="hospedesEditando.length > 1" class="ms-1 text-danger" 
                    (click)="removeHospede(i); $event.stopPropagation()"
                    style="cursor: pointer; font-size: 1.1rem; line-height: 1; user-select: none;"
                    title="Remover hóspede">×</span>
            </div>
          </ng-container>
          <button class="nav-link" type="button" role="tab" (click)="addHospede()">+ Adicionar</button>
        </div>
      </nav>
      <div class="tab-content" id="nav-tabContent">
        <div class="tab-pane fade" [class.show]="activeTab === 'home'" [class.active]="activeTab === 'home'" role="tabpanel">
            <!-- RESERVA EDIT-->
         <div class="mb-3" *ngIf="!this.isDisponivel">
                <label for="status" class="form-label">Reserva</label>
                <select class="form-select" [(ngModel)]="updateReserva.reservaStatus" name="status">
                  <option value="undefined" selected>Selecione o Status:</option>
                  <option value="2">Pré-Reserva</option>
                  <option value="3">Aguardando Pagamento</option>
                  <option value="4">Bloqueado</option>
                  <option value="5">Confirmada</option>
                </select>
              </div>
            <div class="mb-3">
              <label for="Adultos" class="form-label">Adultos</label>
              <input type="text" class="form-control" id="Adultos" [(ngModel)]="updateReserva.adults" name="Adultos" >
            </div>
            <div>
              <label for="kids" class="form-label">Crianças</label>
              <input type="currency" class="form-control" id="kids" [(ngModel)]="updateReserva.kids" name="kids" >
            </div>
            <div>
              <label for="clienteNome" class="form-label">Total (R$)</label>
              <input type="currency" class="form-control" id="clienteNome" [(ngModel)]="updateReserva.priceTotal" name="totalAdd" >
            </div>

        </div>
        <!-- HOSPEDE EDIT-->
        <div *ngFor="let hospede of hospedesEditando; let i = index" 
             class="tab-pane fade" 
             [class.show]="activeTab === 'hospede-' + i"
             [class.active]="activeTab === 'hospede-' + i"
             role="tabpanel">
          <div class="form-check">
              <input class="form-check-input" type="checkbox" [id]="'principalHospede-' + i" 
                     [(ngModel)]="hospede.principal" 
                     [name]="'principalHospede-' + i"
                     (change)="onPrincipalChange(i)">
              <label class="form-check-label" [for]="'principalHospede-' + i">
                Hospede principal ?
              </label>
          </div>
          <div class="mb-3">
              <label [for]="'nomeHospede-' + i" class="form-label">Primeiro Nome</label>
              <input type="text" class="form-control" [id]="'nomeHospede-' + i" [name]="'nomeHospede-' + i" [(ngModel)]="hospede.Name" >
          </div>
          <div class="mb-3">
              <label [for]="'sobrenomeHospede-' + i" class="form-label">Sobrenome</label>
              <input type="text" class="form-control" [id]="'sobrenomeHospede-' + i" [name]="'sobrenomeHospede-' + i" [(ngModel)]="hospede.FamilyName" >
          </div>
          <div class="mb-3">
              <label [for]="'emailHospede-' + i" class="form-label">Email</label>
              <input type="email" class="form-control" [id]="'emailHospede-' + i" [name]="'emailHospede-' + i" [(ngModel)]="hospede.Email" >
          </div>
          <div class="mb-3">
              <label [for]="'cpfHospede-' + i" class="form-label">CPF</label>
              <input type="text" class="form-control" [id]="'cpfHospede-' + i" [name]="'cpfHospede-' + i" [(ngModel)]="hospede.CPF" >
          </div>
          <div class="mb-3">
              <label [for]="'phoneHospede-' + i" class="form-label">Telefone</label>
              <input type="text" class="form-control" [id]="'phoneHospede-' + i" [name]="'phoneHospede-' + i" [(ngModel)]="hospede.Phone" >
          </div>  
          <div class="mb-3">
              <label [for]="'birthHospede-' + i" class="form-label">Data de nascimento</label>
              <input type="date" class="form-control" [id]="'birthHospede-' + i" [name]="'birthHospede-' + i" [(ngModel)]="hospede.DateBirth" >
          </div>  
          <div class="mb-3">
              <label [for]="'cepHospede-' + i" class="form-label">CEP</label>
              <input type="text" class="form-control" [id]="'cepHospede-' + i" [name]="'cepHospede-' + i" [(ngModel)]="hospede.CEP" >
          </div>  
          <div class="mb-3">
              <label [for]="'stateHospede-' + i" class="form-label">Estado</label>
              <input type="text" class="form-control" [id]="'stateHospede-' + i" [name]="'stateHospede-' + i" [(ngModel)]="hospede.State" >
          </div>  
          <div class="mb-3">
              <label [for]="'cityHospede-' + i" class="form-label">Cidade</label>
              <input type="text" class="form-control" [id]="'cityHospede-' + i" [name]="'cityHospede-' + i" [(ngModel)]="hospede.City" >
          </div>  
          <div class="mb-3">
              <label [for]="'addressHospede-' + i" class="form-label">Endereço</label>
              <input type="text" class="form-control" [id]="'addressHospede-' + i" [name]="'addressHospede-' + i" [(ngModel)]="hospede.Address" >
          </div>  
          <div class="mb-3">
              <label [for]="'complementHospede-' + i" class="form-label">Complemento (opcional)</label>
              <input type="text" class="form-control" [id]="'complementHospede-' + i" [name]="'complementHospede-' + i" [(ngModel)]="hospede.Complement" >
          </div>  
          <div class="mb-3">
              <label [for]="'bloodTypeHospede-' + i" class="form-label">Tipo sanguíneo (opcional)</label>
              <input type="text" class="form-control" [id]="'bloodTypeHospede-' + i" [name]="'bloodTypeHospede-' + i" [(ngModel)]="hospede.BloodType" >
          </div>  
          <div class="mb-3">
              <label [for]="'textAreaHospede-' + i" class="form-label">Observações (opcional)</label>
              <textarea class="form-control" [id]="'textAreaHospede-' + i" [name]="'textAreaHospede-' + i" [(ngModel)]="hospede.textArea" ></textarea>
          </div> 
        </div>
      </div>
    </div>
    <div class="modal-footer">
      
        <button type="button" class="btn btn-secondary" (click)="reset(); modal.dismiss('Cross click')">Cancelar</button>
        <button class="btn btn-primary" (click)="UpdateReserva()">Confirmar</button>

      </div>
  </ng-template>

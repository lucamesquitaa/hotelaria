
<!-- Sidebar Menu -->
<div [@collapseExpand]="isOpen ? 'expanded' : 'collapsed'" 
     [class.menu-open]="isOpen"
     [class.menu-collapsed]="!isOpen"
     [class.menu-expanded]="isOpen"
     class="d-flex flex-column flex-shrink-0 p-3 text-white contBar" 
     [style.width]="isOpen ? '280px' : '60px'">
    
    <!-- Brand/Logo -->
    <div class="d-flex justify-content-center align-items-center" [ngClass]="isOpen ? 'justify-content-between' : 'justify-content-center'">
        <a href="/" class="menu-brand" [class.d-none]="!isOpen">
            <img src="assets/logosfundo2.png" class="logoCasinha" alt="logo turify casinha"/>
        </a>
        <!-- Botão de collapse/expand -->
        <button class="btn btn-link text-white p-0" (click)="toggleMenu()" type="button">
           <i class="bi bi-list" style="font-size: 1.5rem;"></i>
        </button>
    </div>
    
    <!-- Conteúdo do menu - visível apenas quando expandido -->
    <div [class.d-none]="!isOpen" class="conteudoMeniu">
        <hr>
        
        <!-- Navigation Menu -->
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="/dashboard" class="nav-link text-white" 
                   [class.active]="selected === 'dashboard'" 
                   routerLinkActive="active">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin" class="nav-link text-white d-flex justify-content-between align-items-center" [class.active]="selected === 'admin'" routerLinkActive="active">
                    <span>
                        <i class="bi bi-building"></i>
                        Hotéis
                    </span>
                    <!-- <i class="bi" [class.bi-chevron-down]="!isHoteisMenuOpen" [class.bi-chevron-up]="isHoteisMenuOpen"></i> -->
                </a>
                <!-- <div [ngbCollapse]="!isHoteisMenuOpen" id="hoteisSubmenu">
                    <ul class="nav nav-pills flex-column ms-3">
                        <li class="nav-item">
                            <a href="/cadastro" class="nav-link text-white" routerLinkActive="active">
                                <i class="bi bi-pencil"></i>
                                Cadastro
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/quartos" class="nav-link text-white" routerLinkActive="active">
                                <i class="bi bi-door-open"></i>
                                Quartos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/managers" class="nav-link text-white" routerLinkActive="active">
                                <i class="bi bi-people"></i>
                                Gerentes
                            </a>
                        </li>
                    </ul>
                </div> -->
            </li>
            <li class="nav-item">
                <a href="/cadastro" class="nav-link text-white" routerLinkActive="active" [class.active]="selected === 'cadastro'">
                                <i class="bi bi-pencil"></i>
                                Cadastro
                </a>
            </li>
        </ul>
        
        <!-- User section at bottom -->
        <div class="dropdown" ngbDropdown placement="top-start">
            <hr>
            <a class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" 
               id="dropdownUser1" ngbDropdownToggle aria-expanded="false">
                <i class="bi bi-person-circle me-2" style="font-size: 32px;"></i>
                <strong>Usuário</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" ngbDropdownMenu aria-labelledby="dropdownUser1">
                <li><a class="dropdown-item" >{{this.cookieService.get("user_first_name") == 'undefined' ? '' : this.cookieService.get("user_first_name")}} {{this.cookieService.get("user_last_name") == 'undefined' ? '' : this.cookieService.get("user_last_name")}}</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" (click)="logout()">Sair</a></li>
            </ul>
        </div>
    </div>
</div>

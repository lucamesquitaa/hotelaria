<div class="select-remote-container" [class.disabled]="disabled">
  <div class="select-input" 
       [class.open]="isOpen" 
       [class.has-value]="selectedValue || selectedValues.length > 0"
       (click)="toggleDropdown()">
    
    <div class="selected-value">
      <span>{{ getSelectedLabel() }}</span>
    </div>
    
    <div class="select-actions">
      <button type="button" 
              class="clear-button" 
              *ngIf="clearable && (selectedValue || selectedValues.length > 0)" 
              (click)="clear(); $event.stopPropagation()"
              [disabled]="disabled">
        <i class="fas fa-times"></i>
      </button>
      
      <div class="dropdown-arrow">
        <i class="fas fa-chevron-down" [class.rotate]="isOpen"></i>
      </div>
    </div>
  </div>

  <div class="dropdown" *ngIf="isOpen">
    
    <!-- Search input -->
    <div class="search-container" *ngIf="searchable">
      <input type="text" 
             class="search-input"
             placeholder="Pesquisar..."
             [value]="searchTerm"
             (input)="onSearchInput($event)"
             (click)="$event.stopPropagation()" />
      <i class="fas fa-search search-icon"></i>
    </div>

    <!-- Loading indicator -->
    <div class="loading" *ngIf="isLoading">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Carregando...</span>
    </div>

    <!-- Options list -->
    <div class="options-container" *ngIf="!isLoading">
      <div class="option" 
           *ngFor="let option of filteredOptions; trackBy: trackByValue"
           [class.selected]="isSelected(option)"
           (click)="onSelect(option)">
        
        <div class="option-content">
          <i class="fas fa-check" *ngIf="isSelected(option) && !multiple"></i>
          <input type="checkbox" 
                 *ngIf="multiple" 
                 [checked]="isSelected(option)"
                 (click)="$event.stopPropagation()">
          <span class="option-label">{{ option.label }}</span>
        </div>
      </div>

      <!-- No results -->
      <div class="no-results" *ngIf="filteredOptions.length === 0">
        <i class="fas fa-search"></i>
        <span>Nenhum resultado encontrado</span>
      </div>

      <!-- Load more button -->
      <div class="load-more" *ngIf="hasMore && !isLoading">
        <button type="button" 
                class="load-more-button"
                (click)="loadMore()">
          Carregar mais
        </button>
      </div>
    </div>
  </div>
</div>
